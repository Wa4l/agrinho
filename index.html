<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Echo do Solo - Agro Sustentável</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main id="app">
        <h1>Echo do Solo</h1>
        <p>Ouça a saúde da sua terra</p>

        <div id="visualizador-solo">
            <div id="particulas"></div>
        </div>

        <section class="controles">
            <div class="control-group">
                <label>Uso de Biofertilizantes</label>
                <input type="range" id="bio" min="0" max="100" value="50">
            </div>
            <div class="control-group">
                <label>Pesticidas Químicos</label>
                <input type="range" id="quimico" min="0" max="100" value="50">
            </div>
            <button id="btn-ouvir">Iniciar Monitoramento Sonoro</button>
        </section>
    </main>
    <script src="script.js"></script>
</body>
<script>
    // Seu código JavaScript entra aqui
    console.log("O sistema de monitoramento está ativo.");
</script>
</html>
